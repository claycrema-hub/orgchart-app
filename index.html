<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Helpers ──────────────────────────────────────────────────────────────────
const CARD_W = 190, CARD_H = 72;
const COLORS = ['#6366f1','#0ea5e9','#10b981','#f59e0b','#ec4899','#8b5cf6','#06b6d4'];

function titleLevel(t='') {
  const tl = t.toLowerCase();
  if (/\bceo\b|chief executive|co-founder.+ceo|founder.+ceo/.test(tl)) return 0;
  if (/\bcfo\b|\bcoo\b|\bcto\b|\bcmo\b|\bcpo\b|\bcro\b|\bclo\b|\bcio\b|\bchro\b|chief\s+\w+\s+officer|\bpresident\b/.test(tl)) return 1;
  if (/\bevp\b|\bsvp\b|executive vice|senior vice/.test(tl)) return 2;
  if (/\bvp\b|vice president/.test(tl)) return 3;
  if (/\bdirector\b|\bhead of\b|\bgeneral manager\b/.test(tl)) return 4;
  return 5;
}
const levelColor = lv => COLORS[Math.min(lv, COLORS.length-1)];
const cut = (s,n) => s && s.length>n ? s.slice(0,n-1)+'…' : (s||'');

function flatToTree(data) {
  const map = {};
  data.people.forEach(p => map[p.id] = {...p, children:[]});
  let root = null;
  const ids = new Set(data.people.map(p=>p.id));
  data.people.forEach(p => {
    if (!p.parentId) { root = map[p.id]; }
    else if (ids.has(p.parentId)) { map[p.parentId].children.push(map[p.id]); }
    else if (root) { root.children.push(map[p.id]); }
  });
  if (!root) root = map[data.people[0]?.id];
  return { ...root, companyName:data.company, sources:data.sources||[], _totalCount:data.people.length };
}

function companyKey(name) {
  return name.toLowerCase().replace(/\s*(inc|corp|llc|ltd|co\.?)\b\.?/gi,'').replace(/[^a-z0-9]/g,'');
}

// ─── Anthropic API ────────────────────────────────────────────────────────────
async function lookupCompany(companyName, apiKey) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({
      model:'claude-opus-4-6',
      max_tokens:4096,
      messages:[{role:'user',content:`Generate a current, accurate leadership org chart for "${companyName}".

Return ONLY a valid JSON object — no markdown, no explanation, just the JSON:
{
  "company": "${companyName}",
  "domain": "company.com",
  "people": [
    {"id":"1","name":"Full Name","title":"Job Title","parentId":null,"department":"Executive"},
    {"id":"2","name":"Full Name","title":"Job Title","parentId":"1","department":"Finance"}
  ]
}

Rules:
- CEO/President at top (parentId: null), exactly one root node
- All C-suite report directly to CEO
- Key SVPs/VPs under their C-suite leader
- 15–40 people total, accurate and current
- Return ONLY the JSON object, nothing else`}]
    })
  });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.error?.message || `API error ${res.status}`);
  }
  const d = await res.json();
  const text = d.content[0].text;
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Could not parse response');
  const parsed = JSON.parse(match[0]);
  return { ...parsed, sources:['Claude AI'] };
}

// ─── OrgChart SVG ─────────────────────────────────────────────────────────────
function OrgChart({ data, onSelect }) {
  const svgRef = useRef(null);

  const draw = useCallback(() => {
    if (!svgRef.current || !data) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();

    const root = d3.hierarchy(data);
    const tree = d3.tree().nodeSize([CARD_W+28, CARD_H+52]);
    tree(root);

    const nodes = root.descendants(), links = root.links();
    let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
    nodes.forEach(n=>{
      x0=Math.min(x0,n.x-CARD_W/2); x1=Math.max(x1,n.x+CARD_W/2);
      y0=Math.min(y0,n.y); y1=Math.max(y1,n.y+CARD_H);
    });
    const tW=x1-x0+60, tH=y1-y0+60;
    const el=svgRef.current.parentElement;
    const vw=el.clientWidth||900, vh=el.clientHeight||600;
    svg.attr('width',vw).attr('height',vh);

    const defs=svg.append('defs');
    const f=defs.append('filter').attr('id','sh').attr('x','-20%').attr('y','-20%').attr('width','140%').attr('height','140%');
    f.append('feDropShadow').attr('dx',0).attr('dy',2).attr('stdDeviation',3.5).attr('flood-color','rgba(0,0,0,0.07)');

    const g=svg.append('g');
    const zoom=d3.zoom().scaleExtent([0.12,2.5]).on('zoom',e=>g.attr('transform',e.transform));
    svg.call(zoom);
    const sc=Math.min(1,(vw-60)/tW,(vh-60)/tH);
    svg.call(zoom.transform,d3.zoomIdentity.translate(vw/2,36).scale(sc).translate(-(x0+tW/2-30),0));

    // Links
    g.selectAll('.lk').data(links).join('path')
      .attr('fill','none').attr('stroke','#dde3ed').attr('stroke-width',1.5)
      .attr('d',lk=>{
        const sx=lk.source.x,sy=lk.source.y+CARD_H;
        const tx=lk.target.x,ty=lk.target.y,my=(sy+ty)/2;
        return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
      });

    // Nodes
    const nd=g.selectAll('.nd').data(nodes).join('g')
      .attr('transform',n=>`translate(${n.x-CARD_W/2},${n.y})`)
      .style('cursor','pointer')
      .on('click',(e,n)=>{e.stopPropagation();onSelect(n.data);});
    svg.on('click',()=>onSelect(null));

    // Card
    nd.append('rect').attr('width',CARD_W).attr('height',CARD_H).attr('rx',9).attr('ry',9)
      .attr('fill','white').attr('stroke',n=>levelColor(titleLevel(n.data.title)))
      .attr('stroke-width',1.5).attr('filter','url(#sh)');
    // Accent top
    nd.append('rect').attr('width',CARD_W).attr('height',4).attr('rx',9).attr('fill',n=>levelColor(titleLevel(n.data.title)));
    nd.append('rect').attr('y',2).attr('width',CARD_W).attr('height',3).attr('fill',n=>levelColor(titleLevel(n.data.title)));
    // Name
    nd.append('text').attr('x',CARD_W/2).attr('y',27).attr('text-anchor','middle')
      .attr('font-size',11.5).attr('font-weight','700').attr('fill','#0f172a')
      .attr('font-family',"'Segoe UI',-apple-system,sans-serif")
      .text(n=>cut(n.data.name,25));
    // Title
    nd.append('text').attr('x',CARD_W/2).attr('y',46).attr('text-anchor','middle')
      .attr('font-size',10).attr('fill','#64748b')
      .attr('font-family',"'Segoe UI',-apple-system,sans-serif")
      .text(n=>cut(n.data.title,30));
    // Children badge
    nd.filter(n=>n.children&&n.children.length>0)
      .append('circle').attr('cx',CARD_W-11).attr('cy',CARD_H-11).attr('r',9.5)
      .attr('fill',n=>levelColor(titleLevel(n.data.title)));
    nd.filter(n=>n.children&&n.children.length>0)
      .append('text').attr('x',CARD_W-11).attr('y',CARD_H-11)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-size',9).attr('font-weight','800').attr('fill','white')
      .text(n=>n.children.length);
  },[data,onSelect]);

  useEffect(()=>{
    draw();
    const ro=new ResizeObserver(draw);
    if(svgRef.current?.parentElement) ro.observe(svgRef.current.parentElement);
    return ()=>ro.disconnect();
  },[draw]);

  return <svg ref={svgRef} style={{display:'block',width:'100%',height:'100%'}} />;
}

        {contact.phone&&<PRow k="Phone" v={contact.phone}/>}

}

  const go=e=>{e.preventDefault();if(val.trim())onSearch(val.trim());};
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',background:'#f8fafc',padding:24}}>
      {/* Logo */}
      <div style={{marginBottom:44,textAlign:'center'}}>
        <div style={{
          width:62,height:62,borderRadius:17,
          background:'linear-gradient(135deg,#6366f1,#8b5cf6)',
          display:'flex',alignItems:'center',justifyContent:'center',
          margin:'0 auto 16px',boxShadow:'0 6px 24px rgba(99,102,241,0.32)',
        }}>
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="3.5" r="2.6" fill="white"/>
            <circle cx="4" cy="17" r="2.6" fill="white"/>
            <circle cx="20" cy="17" r="2.6" fill="white"/>
            <line x1="12" y1="6.1" x2="4" y2="14.4" stroke="white" strokeWidth="1.9" strokeLinecap="round"/>
            <line x1="12" y1="6.1" x2="20" y2="14.4" stroke="white" strokeWidth="1.9" strokeLinecap="round"/>
          </svg>
        </div>
        <h1 style={{fontSize:36,fontWeight:900,color:'#0f172a',letterSpacing:'-0.025em',marginBottom:8}}>OrgChart</h1>
        <p style={{color:'#64748b',fontSize:15}}>Visual leadership intelligence for every account</p>
      </div>

      {/* Search */}
      <form onSubmit={go} style={{width:'100%',maxWidth:520}}>
        <div style={{display:'flex',gap:8,boxShadow:'0 2px 16px rgba(0,0,0,0.07)',borderRadius:14}}>
          <input
            value={val} onChange={e=>setVal(e.target.value)}
            placeholder="Type any company name..."
            autoFocus
            style={{flex:1,padding:'15px 20px',borderRadius:'14px 0 0 14px',fontSize:15,border:'1.5px solid #e2e8f0',borderRight:'none',outline:'none',background:'white',color:'#0f172a'}}
          />
          <button type="submit" disabled={!val.trim()} style={{
            padding:'15px 26px',borderRadius:'0 14px 14px 0',fontSize:15,fontWeight:700,
            background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',
            border:'1.5px solid transparent',cursor:'pointer',whiteSpace:'nowrap',
          }}>Search →</button>
        </div>
      </form>

      {/* Chips */}
      <div style={{marginTop:18,display:'flex',gap:7,flexWrap:'wrap',justifyContent:'center',maxWidth:520}}>
        {CHIPS.map(co=>(
          <button key={co} onClick={()=>onSearch(co)} style={{
            padding:'6px 15px',borderRadius:20,fontSize:13,
            background:'white',border:'1.5px solid #e2e8f0',color:'#475569',
            cursor:'pointer',fontWeight:500,
          }}>{co}</button>
        ))}
      </div>

      {/* API status */}
      <div style={{marginTop:28,display:'flex',alignItems:'center',gap:8,fontSize:12,color:'#94a3b8'}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:apiKey?'#10b981':'#cbd5e1',display:'inline-block'}}/>
        {apiKey ? 'Live lookup active — any company works' : 'Pre-loaded: 8 companies'}
        <button onClick={onSettings} style={{color:'#6366f1',background:'none',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,textDecoration:'underline'}}>
          {apiKey?'Change':'Enable live lookup →'}
        </button>
      </div>
    </div>
  );
}

// ─── Loading Screen ────────────────────────────────────────────────────────────
function LoadingScreen({company}){
  const [d,setD]=useState('');
  useEffect(()=>{const iv=setInterval(()=>setD(x=>x.length>=3?'':x+'.'),380);return()=>clearInterval(iv);},[]);
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',background:'#f8fafc',gap:16}}>
      <svg width="48" height="48" viewBox="0 0 48 48" style={{animation:'spin 0.9s linear infinite'}}>
        <circle cx="24" cy="24" r="20" fill="none" stroke="#e2e8f0" strokeWidth="4"/>
        <path d="M24 4 A20 20 0 0 1 44 24" fill="none" stroke="#6366f1" strokeWidth="4" strokeLinecap="round"/>
      </svg>
      <div style={{fontWeight:700,fontSize:19,color:'#0f172a'}}>Building org chart for {company}{d}</div>
      <div style={{fontSize:13,color:'#94a3b8'}}>Querying leadership data via Claude AI</div>
    </div>
  );
}

// ─── Chart Header ──────────────────────────────────────────────────────────────
function Header({company,sources,count,onBack}){
  return(
    <div style={{height:54,background:'white',borderBottom:'1px solid #e8ecf2',display:'flex',alignItems:'center',padding:'0 18px',gap:12,flexShrink:0}}>
      <button onClick={onBack} style={{background:'none',border:'1px solid #e2e8f0',borderRadius:8,padding:'5px 12px',fontSize:13,cursor:'pointer',color:'#475569',fontWeight:600}}>← Back</button>
      <div style={{fontWeight:800,fontSize:16,color:'#0f172a'}}>{company}</div>
      <div style={{fontSize:12,color:'#94a3b8',fontWeight:500}}>{count} people</div>
      <div style={{marginLeft:'auto',display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:11,color:'#94a3b8'}}>Sources:</span>
        {(sources||[]).map(s=>(
          <span key={s} style={{fontSize:11,background:'#eef2ff',color:'#4f46e5',borderRadius:5,padding:'2px 8px',fontWeight:600}}>{s}</span>
        ))}
      </div>
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('search');
  const [query,setQuery]=useState('');
  const [tree,setTree]=useState(null);
  const [error,setError]=useState('');
  const [selected,setSelected]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [apiKey,setApiKey]=useState(()=>{ try{return localStorage.getItem('oc_api_key')||'';}catch{return '';} });

  const saveKey=k=>{
    setApiKey(k);
    try{ k?localStorage.setItem('oc_api_key',k):localStorage.removeItem('oc_api_key'); }catch{}
  };

  const handleSearch=async company=>{
    setQuery(company); setSelected(null); setError('');
    const key=companyKey(company);
    if(COMPANIES[key]){
      setTree(flatToTree(COMPANIES[key]));
      setScreen('chart');
      return;
    }
    if(apiKey){
      setScreen('loading');
      try{
        const data=await lookupCompany(company,apiKey);
        setTree(flatToTree(data));
        setScreen('chart');
      }catch(e){
        setError(e.message);
        setScreen('error');
      }
    } else {
      setError(`"${company}" isn't in the pre-loaded list. Enable live lookup to search any company instantly.`);
      setScreen('error');
    }
  };

  function countAll(n){ if(!n)return 0; return 1+(n.children||[]).reduce((s,c)=>s+countAll(c),0); }

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {showSettings&&<ApiKeyModal apiKey={apiKey} onSave={saveKey} onClose={()=>setShowSettings(false)}/>}

      {screen==='search'&&<SearchScreen onSearch={handleSearch} apiKey={apiKey} onSettings={()=>setShowSettings(true)}/>}

      {screen==='loading'&&<LoadingScreen company={query}/>}

      {screen==='error'&&(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14,fontFamily:"'Segoe UI',-apple-system,sans-serif"}}>
          <div style={{fontSize:44}}>😕</div>
          <div style={{fontWeight:800,fontSize:19,color:'#0f172a'}}>Company not found</div>
          <div style={{color:'#64748b',fontSize:14,maxWidth:400,textAlign:'center',lineHeight:1.6}}>{error}</div>
          <div style={{display:'flex',gap:8,marginTop:4}}>
            <button onClick={()=>setScreen('search')} style={{padding:'10px 22px',borderRadius:10,fontSize:14,fontWeight:700,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',border:'none',cursor:'pointer'}}>Try another</button>
            {!apiKey&&<button onClick={()=>{setScreen('search');setShowSettings(true);}} style={{padding:'10px 22px',borderRadius:10,fontSize:14,fontWeight:700,background:'white',color:'#6366f1',border:'2px solid #6366f1',cursor:'pointer'}}>Enable live lookup</button>}
          </div>
        </div>
      )}

      {screen==='chart'&&tree&&(
        <>
          <Header company={tree.companyName} sources={tree.sources} count={countAll(tree)} onBack={()=>{setScreen('search');setSelected(null);}}/>
          <div style={{flex:1,overflow:'hidden',position:'relative',background:'#f8fafc'}}>
            <OrgChart data={tree} onSelect={setSelected}/>
            <ContactPanel contact={selected} onClose={()=>setSelected(null)}/>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
