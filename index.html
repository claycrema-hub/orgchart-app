<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const CARD_W = 200, CARD_H = 82;
const DEPT_COLORS = {Executive:'#6366f1',Finance:'#0ea5e9',Product:'#8b5cf6',Engineering:'#06b6d4',Sales:'#10b981',Marketing:'#f59e0b',HR:'#ec4899',Legal:'#64748b',Operations:'#f97316',IT:'#14b8a6',Customer:'#a855f7',Brand:'#e11d48',Comms:'#84cc16',DEI:'#d946ef',Partnerships:'#0d9488'};
const deptColor = d => DEPT_COLORS[d] || '#6366f1';
function titleLevel(t='') {
  const s = t.toLowerCase();
  if (/\bceo\b|chief executive|co-founder.+ceo/.test(s)) return 0;
  if (/\bcfo\b|\bcoo\b|\bcto\b|\bcmo\b|\bcpo\b|\bcro\b|\bclo\b|\bcio\b|\bchro\b|chief\s+\w+\s+officer|\bpresident\b/.test(s)) return 1;
  if (/\bevp\b|\bsvp\b/.test(s)) return 2;
  if (/\bvp\b|vice president/.test(s)) return 3;
  if (/director|head of/.test(s)) return 4;
  return 5;
}
function guessDept(title='') {
  const t = title.toLowerCase();
  if (/sales|revenue|account|commercial|go.to.market/i.test(t)) return 'Sales';
  if (/market|brand|comm/i.test(t)) return 'Marketing';
  if (/engineer|tech|platform|architect|data/i.test(t)) return 'Engineering';
  if (/product/i.test(t)) return 'Product';
  if (/financ|cfo|controller|treasury/i.test(t)) return 'Finance';
  if (/legal|counsel|compliance/i.test(t)) return 'Legal';
  if (/people|human|talent|hr|recruiting/i.test(t)) return 'HR';
  if (/operation|coo/i.test(t)) return 'Operations';
  if (/customer|success|support/i.test(t)) return 'Customer';
  if (/security|info|cio|ciso/i.test(t)) return 'IT';
  if (/ceo|chief exec|co-founder/i.test(t)) return 'Executive';
  return 'Executive';
}
const cut = (s,n) => s&&s.length>n ? s.slice(0,n-1)+'...' : (s||'');
const companyKey = n => n.toLowerCase().replace(/\s*(inc|corp|llc|ltd|co\.?)\b\.?/gi,'').replace(/[^a-z0-9]/g,'');
const nextId = (people) => String(Math.max(0,...people.map(p=>parseInt(p.id)||0))+1);

function flatToTree(people, companyName, sources) {
  const map = {};
  people.forEach(p => map[p.id] = {...p, children:[]});
  let root = null;
  const ids = new Set(people.map(p=>p.id));
  people.forEach(p => {
    if (!p.parentId) root = map[p.id];
    else if (ids.has(p.parentId)) map[p.parentId].children.push(map[p.id]);
    else if (root) root.children.push(map[p.id]);
  });
  if (!root && people.length) root = map[people[0].id];
  return { ...root, companyName, sources: sources||[], _flat: people };
}

// Anthropic API - initial lookup
async function lookupCompany(company, apiKey) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6', max_tokens:4096,
      messages:[{role:'user',content:`Generate a current leadership org chart for "${company}".
Return ONLY valid JSON, no markdown:
{"company":"${company}","domain":"company.com","people":[
  {"id":"1","name":"Full Name","title":"Job Title","parentId":null,"department":"Executive"},
  {"id":"2","name":"Full Name","title":"Job Title","parentId":"1","department":"Finance"}
]}
Rules: CEO at top (parentId null). C-suite reports to CEO. Key VPs under C-suite. 15-40 people. Use accurate current data. Department should be one of: Executive, Finance, Product, Engineering, Sales, Marketing, HR, Legal, Operations, IT, Customer.`}]
    })
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`API error ${res.status}`); }
  const d = await res.json();
  const m = d.content[0].text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('Could not parse response');
  return { ...JSON.parse(m[0]), sources:['Claude AI'] };
}

// Anthropic API - search for people at a company (People Finder)
async function searchPeople(company, role, apiKey) {
  const roleClause = role ? `Focus on people with "${role}" in their title or in the ${role} department.` : 'Include a broad mix of C-suite, VPs, SVPs, and Directors across all departments.';
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6', max_tokens:4096,
      messages:[{role:'user',content:`List real current leaders at "${company}". ${roleClause}
Return ONLY a valid JSON array, no markdown, no explanation:
[{"name":"Full Name","title":"Job Title","department":"Dept"}, ...]
Rules:
- 10-20 people, real and current
- Department: one of Executive, Finance, Product, Engineering, Sales, Marketing, HR, Legal, Operations, IT, Customer
- Include name, title, department only
- Be accurate — only include people you're confident actually work there now`}]
    })
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`API error ${res.status}`); }
  const d = await res.json();
  const m = d.content[0].text.match(/\[[\s\S]*\]/);
  if (!m) throw new Error('Could not parse response');
  return JSON.parse(m[0]);
}

// ─── Draggable Org Chart ──────────────────────────────────────────────────
function OrgChart({ data, onSelect, onReparent, zoomRef }) {
  const svgRef = useRef(null);
  const stateRef = useRef({ zoomBehavior:null, zoomTransform:d3.zoomIdentity });

  const draw = useCallback(() => {
    if (!svgRef.current || !data) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();
    const root = d3.hierarchy(data);
    const tree = d3.tree().nodeSize([CARD_W+32, CARD_H+56]);
    tree(root);
    const nodes = root.descendants(), links = root.links();
    let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
    nodes.forEach(n=>{x0=Math.min(x0,n.x-CARD_W/2);x1=Math.max(x1,n.x+CARD_W/2);y0=Math.min(y0,n.y);y1=Math.max(y1,n.y+CARD_H);});
    const tW=x1-x0+60, tH=y1-y0+70;
    const el=svgRef.current.parentElement;
    const vw=el.clientWidth||900, vh=el.clientHeight||600;
    svg.attr('width',vw).attr('height',vh);

    const defs=svg.append('defs');
    const f=defs.append('filter').attr('id','sh').attr('x','-30%').attr('y','-30%').attr('width','160%').attr('height','160%');
    f.append('feDropShadow').attr('dx',0).attr('dy',2).attr('stdDeviation',4).attr('flood-color','rgba(0,0,0,0.08)');
    const fBig=defs.append('filter').attr('id','sh2').attr('x','-30%').attr('y','-30%').attr('width','160%').attr('height','160%');
    fBig.append('feDropShadow').attr('dx',0).attr('dy',8).attr('stdDeviation',14).attr('flood-color','rgba(99,102,241,0.22)');

    const g = svg.append('g').attr('class','tree-root');
    const zoom = d3.zoom().scaleExtent([0.08,3])
      .on('zoom', e => { g.attr('transform', e.transform); stateRef.current.zoomTransform = e.transform; });
    svg.call(zoom);
    stateRef.current.zoomBehavior = zoom;
    const sc = Math.min(1,(vw-60)/tW,(vh-60)/tH);
    const initT = d3.zoomIdentity.translate(vw/2,40).scale(sc).translate(-(x0+tW/2-30),0);
    svg.call(zoom.transform, initT);
    if (zoomRef) {
      zoomRef.current = {
        zoomIn: () => svg.transition().duration(300).call(zoom.scaleBy, 1.4),
        zoomOut: () => svg.transition().duration(300).call(zoom.scaleBy, 0.7),
        fitView: () => { const sc2=Math.min(1,(vw-60)/tW,(vh-60)/tH); const t=d3.zoomIdentity.translate(vw/2,40).scale(sc2).translate(-(x0+tW/2-30),0); svg.transition().duration(400).call(zoom.transform,t); }
      };
    }

    const linkGroup = g.append('g');
    const nodeGroup = g.append('g');
    linkGroup.selectAll('.lk').data(links).join('path').attr('class','lk')
      .attr('fill','none').attr('stroke','#dde3ed').attr('stroke-width',1.5)
      .attr('d', lk=>{ const sx=lk.source.x,sy=lk.source.y+CARD_H,tx=lk.target.x,ty=lk.target.y,my=(sy+ty)/2; return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`; });

    let dropTarget=null, dragNode=null, didDrag=false;
    function isAncestorOf(a,n){let c=n.parent;while(c){if(c===a)return true;c=c.parent;}return false;}

    const nd = nodeGroup.selectAll('.nd').data(nodes).join('g')
      .attr('class','nd').attr('transform',n=>`translate(${n.x-CARD_W/2},${n.y})`).style('cursor','grab');
    nd.append('rect').attr('class','card-bg').attr('width',CARD_W).attr('height',CARD_H).attr('rx',10).attr('ry',10)
      .attr('fill','white').attr('stroke','#e2e8f0').attr('stroke-width',1.5).attr('filter','url(#sh)');
    nd.append('rect').attr('width',CARD_W).attr('height',4).attr('rx',10).attr('fill',n=>deptColor(n.data.department));
    nd.append('rect').attr('y',2).attr('width',CARD_W).attr('height',3).attr('fill',n=>deptColor(n.data.department));
    nd.append('text').attr('x',CARD_W/2).attr('y',28).attr('text-anchor','middle')
      .attr('font-size',12).attr('font-weight','700').attr('fill','#0f172a')
      .attr('font-family',"-apple-system,'Segoe UI',sans-serif").text(n=>cut(n.data.name,24));
    nd.append('text').attr('x',CARD_W/2).attr('y',46).attr('text-anchor','middle')
      .attr('font-size',10).attr('fill','#64748b')
      .attr('font-family',"-apple-system,'Segoe UI',sans-serif").text(n=>cut(n.data.title,30));
    nd.each(function(n){
      const dept=n.data.department; if(!dept)return;
      const g2=d3.select(this), tw=dept.length*5.5+14, bx=CARD_W/2-tw/2;
      g2.append('rect').attr('x',bx).attr('y',56).attr('width',tw).attr('height',16).attr('rx',8).attr('fill',deptColor(dept)).attr('opacity',0.12);
      g2.append('text').attr('x',CARD_W/2).attr('y',67).attr('text-anchor','middle').attr('font-size',8.5).attr('font-weight','700').attr('fill',deptColor(dept)).attr('font-family',"-apple-system,'Segoe UI',sans-serif").text(dept);
    });
    nd.filter(n=>n.children&&n.children.length>0).append('circle').attr('cx',CARD_W-12).attr('cy',CARD_H-12).attr('r',10).attr('fill',n=>deptColor(n.data.department));
    nd.filter(n=>n.children&&n.children.length>0).append('text').attr('x',CARD_W-12).attr('y',CARD_H-12).attr('text-anchor','middle').attr('dominant-baseline','middle').attr('font-size',9).attr('font-weight','800').attr('fill','white').text(n=>n.children.length);
    nd.append('rect').attr('width',CARD_W).attr('height',CARD_H).attr('rx',10).attr('fill','transparent');

    const drag = d3.drag()
      .on('start', function(event,d){if(event.sourceEvent)event.sourceEvent.stopPropagation();didDrag=false;dragNode=d;d3.select(this).raise().style('cursor','grabbing');d3.select(this).select('.card-bg').attr('filter','url(#sh2)').attr('stroke-width',2.5).attr('opacity',0.92);})
      .on('drag', function(event,d){
        if(Math.abs(event.dx)<1&&Math.abs(event.dy)<1&&!didDrag)return;didDrag=true;
        d3.select(this).attr('transform',`translate(${event.x-CARD_W/2},${event.y-CARD_H/2})`);
        let nearest=null,minDist=100;
        nodes.forEach(n=>{if(n===d||n===d.parent||isAncestorOf(d,n))return;const dist=Math.hypot(n.x-event.x,(n.y+CARD_H/2)-event.y);if(dist<minDist){minDist=dist;nearest=n;}});
        if(nearest!==dropTarget){if(dropTarget)nodeGroup.selectAll('.nd').filter(n=>n===dropTarget).select('.card-bg').attr('stroke','#e2e8f0').attr('stroke-width',1.5);dropTarget=nearest;if(dropTarget)nodeGroup.selectAll('.nd').filter(n=>n===dropTarget).select('.card-bg').attr('stroke','#10b981').attr('stroke-width',3);}
      })
      .on('end', function(event,d){
        d3.select(this).style('cursor','grab');d3.select(this).select('.card-bg').attr('filter','url(#sh)').attr('stroke-width',1.5).attr('opacity',1);
        if(dropTarget)nodeGroup.selectAll('.nd').filter(n=>n===dropTarget).select('.card-bg').attr('stroke','#e2e8f0').attr('stroke-width',1.5);
        if(!didDrag){d3.select(this).attr('transform',`translate(${d.x-CARD_W/2},${d.y})`);onSelect(d.data);dropTarget=null;dragNode=null;return;}
        if(dropTarget&&dropTarget!==d&&dropTarget!==d.parent){onReparent(d.data.id,dropTarget.data.id);}
        else{d3.select(this).transition().duration(220).ease(d3.easeCubicOut).attr('transform',`translate(${d.x-CARD_W/2},${d.y})`);}
        dropTarget=null;dragNode=null;
      });
    nd.call(drag);
    svg.on('click',()=>onSelect(null));
  },[data,onSelect,onReparent,zoomRef]);

  useEffect(()=>{draw();const ro=new ResizeObserver(draw);if(svgRef.current?.parentElement)ro.observe(svgRef.current.parentElement);return()=>ro.disconnect();},[draw]);
  return(
    <div style={{position:'relative',width:'100%',height:'100%'}}>
      <svg ref={svgRef} style={{display:'block',width:'100%',height:'100%'}} />
      <div style={{position:'absolute',bottom:12,left:'50%',transform:'translateX(-50%)',background:'rgba(255,255,255,0.88)',backdropFilter:'blur(6px)',border:'1px solid #e2e8f0',borderRadius:20,padding:'5px 16px',fontSize:12,color:'#94a3b8',pointerEvents:'none',whiteSpace:'nowrap',boxShadow:'0 1px 6px rgba(0,0,0,0.06)'}}>
        Drag cards to rearrange &middot; Click to view details &middot; Scroll to zoom
      </div>
    </div>
  );
}

// ─── People Finder Panel ──────────────────────────────────────────────────
function PeopleFinder({ open, onClose, apiKey, people, onAddPerson, companyName, onRequestApiKey }) {
  const [searchCo, setSearchCo] = useState('');
  const [searchRole, setSearchRole] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [error, setError] = useState('');
  const [addingIdx, setAddingIdx] = useState(null); // index of result being added — show parent picker
  const [parentId, setParentId] = useState('');

  useEffect(() => { if (companyName) setSearchCo(companyName); }, [companyName]);

  const handleSearch = async (e) => {
    e && e.preventDefault();
    if (!searchCo.trim()) return;
    if (!apiKey) { onRequestApiKey(); return; }
    setSearching(true); setError(''); setResults([]);
    try {
      const r = await searchPeople(searchCo.trim(), searchRole.trim(), apiKey);
      setResults(r);
    } catch(err) { setError(err.message); }
    setSearching(false);
  };

  const existingNames = new Set(people.map(p => p.name.toLowerCase()));

  const handleAdd = (person) => {
    const dept = person.department || guessDept(person.title);
    onAddPerson({ name: person.name, title: person.title, department: dept, parentId: parentId || people[0]?.id || null });
    setAddingIdx(null); setParentId('');
  };

  if (!open) return null;

  return (
    <div style={{
      position:'absolute', top:0, left:0, width:320, height:'100%', background:'white',
      borderRight:'1px solid #e2e8f0', zIndex:15, display:'flex', flexDirection:'column',
      boxShadow:'4px 0 24px rgba(0,0,0,0.08)', animation:'slideIn .2s ease',
      fontFamily:"-apple-system,'Segoe UI',sans-serif"
    }}>
      {/* Header */}
      <div style={{padding:'14px 16px',borderBottom:'1px solid #e8ecf2',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:18}}>&#128269;</span>
          <span style={{fontWeight:800,fontSize:15,color:'#0f172a'}}>People Finder</span>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',fontSize:22,lineHeight:1}}>x</button>
      </div>

      {/* Search Form */}
      <form onSubmit={handleSearch} style={{padding:'12px 16px',borderBottom:'1px solid #f1f5f9',flexShrink:0}}>
        <label className="field-label">Company</label>
        <input value={searchCo} onChange={e=>setSearchCo(e.target.value)} className="field-input" placeholder="e.g. Snowflake" style={{marginBottom:8}}/>
        <label className="field-label">Role / Department (optional)</label>
        <input value={searchRole} onChange={e=>setSearchRole(e.target.value)} className="field-input" placeholder="e.g. Sales, VP, Engineering" style={{marginBottom:10}}/>
        <button type="submit" disabled={!searchCo.trim()||searching} className="btn-primary" style={{width:'100%',fontSize:13,padding:'9px 0',opacity:searchCo.trim()&&!searching?1:0.5}}>
          {searching ? (
            <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <span style={{display:'inline-block',width:14,height:14,border:'2px solid white',borderTop:'2px solid transparent',borderRadius:'50%',animation:'spin .6s linear infinite'}}/>
              Searching...
            </span>
          ) : 'Search People'}
        </button>
        {!apiKey && <div style={{fontSize:11,color:'#f59e0b',marginTop:6,textAlign:'center'}}>API key required — click to set up</div>}
      </form>

      {/* Results */}
      <div style={{flex:1,overflow:'auto',padding:'12px 16px'}}>
        {error && <div style={{color:'#dc2626',fontSize:12,marginBottom:8}}>{error}</div>}
        {results.length > 0 && <div style={{fontSize:11,color:'#94a3b8',marginBottom:8,fontWeight:600}}>{results.length} people found</div>}
        {results.map((person, idx) => {
          const alreadyAdded = existingNames.has(person.name.toLowerCase());
          const isAdding = addingIdx === idx;
          return (
            <div key={idx} className="finder-card" style={{opacity:alreadyAdded?0.5:1}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:12,color:'#0f172a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{person.name}</div>
                  <div style={{fontSize:10,color:'#64748b',marginTop:1}}>{person.title}</div>
                  {person.department && <span style={{display:'inline-block',fontSize:8.5,background:deptColor(person.department||'Executive')+'1a',color:deptColor(person.department||'Executive'),borderRadius:4,padding:'1px 6px',fontWeight:700,marginTop:3}}>{person.department}</span>}
                </div>
                {alreadyAdded ? (
                  <span style={{fontSize:10,color:'#10b981',fontWeight:700,whiteSpace:'nowrap',paddingTop:2}}>&#10003; Added</span>
                ) : (
                  <button onClick={()=>{setAddingIdx(isAdding?null:idx);setParentId(people[0]?.id||'');}} className="finder-add-btn">{isAdding?'Cancel':'+ Add'}</button>
                )}
              </div>
              {isAdding && !alreadyAdded && (
                <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid #f1f5f9'}}>
                  <label style={{fontSize:10,fontWeight:700,color:'#64748b',display:'block',marginBottom:3}}>Reports to:</label>
                  <select value={parentId} onChange={e=>setParentId(e.target.value)} style={{width:'100%',padding:'6px 8px',borderRadius:6,border:'1.5px solid #e2e8f0',fontSize:11,marginBottom:6}}>
                    {people.map(p=><option key={p.id} value={p.id}>{p.name} — {cut(p.title,20)}</option>)}
                  </select>
                  <button onClick={()=>handleAdd(person)} className="btn-primary" style={{width:'100%',fontSize:12,padding:'7px 0'}}>Drop into Chart</button>
                </div>
              )}
            </div>
          );
        })}
        {results.length === 0 && !searching && !error && (
          <div style={{textAlign:'center',color:'#94a3b8',fontSize:12,marginTop:40,lineHeight:1.7}}>
            Search for people at any company.<br/>Click <strong>+ Add</strong> to drop them into your org chart.
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Contact Panel ──────────────────────────────────────────────────────────
function ContactPanel({contact, people, onClose, onUpdate, onDelete}) {
  const [editing, setEditing] = useState(false);

  const color = deptColor(contact.department);

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>

                <input value={form.title||''} onChange={e=>setForm({...form,title:e.target.value})} className="field-input" style={{marginBottom:6,fontSize:12}} placeholder="Title"/>

                </select>
                <input value={form.email||''} onChange={e=>setForm({...form,email:e.target.value})} className="field-input" style={{marginBottom:6,fontSize:12}} placeholder="Email"/>
                <input value={form.phone||''} onChange={e=>setForm({...form,phone:e.target.value})} className="field-input" style={{marginBottom:6,fontSize:12}} placeholder="Phone"/>

                <div style={{fontSize:12,color:color,fontWeight:600,marginBottom:4}}>{contact.title}</div>

                {contact.email&&<PRow k="Email" v={contact.email}/>}

          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',fontSize:22,lineHeight:1,paddingLeft:8,flexShrink:0}}>x</button>
        </div>
        {!editing&&<div style={{display:'flex',gap:6,borderTop:'1px solid #f1f5f9',paddingTop:10,marginTop:4}}>
          <button onClick={()=>setEditing(true)} className="toolbar-btn" style={{fontSize:11}}>Edit</button>
          {!confirmDel?<button onClick={()=>setConfirmDel(true)} className="btn-danger" style={{fontSize:11,padding:'5px 12px'}}>Delete</button>:
          <div style={{display:'flex',gap:4,alignItems:'center'}}><span style={{fontSize:11,color:'#dc2626'}}>Sure?</span><button onClick={()=>onDelete(contact.id)} className="btn-danger" style={{fontSize:11,padding:'4px 10px'}}>Yes</button><button onClick={()=>setConfirmDel(false)} className="btn-secondary" style={{fontSize:11,padding:'4px 10px'}}>No</button></div>}
        </div>}
      </div>
    </div>
  );
}
function PRow({k,v}){return(<div style={{marginBottom:6}}><div style={{fontSize:9,color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:2}}>{k}</div><div style={{fontSize:11,color:'#334155'}}>{v}</div></div>);}

        <div style={{marginTop:20,display:'flex',alignItems:'center',gap:8,fontSize:12,color:'#94a3b8'}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'#10b981',display:'inline-block'}}/>Live lookup + People Finder active
          <button onClick={onSettings} style={{color:'#6366f1',background:'none',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,textDecoration:'underline'}}>Change key</button>
        </div>
      )}
    </div>
  );
}

function LoadingScreen({company}){
  const [d,setD]=useState('');
  useEffect(()=>{const iv=setInterval(()=>setD(x=>x.length>=3?'':x+'.'),380);return()=>clearInterval(iv);},[]);
  return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',background:'#f8fafc',gap:16,fontFamily:"-apple-system,'Segoe UI',sans-serif"}}>
    <svg width="48" height="48" viewBox="0 0 48 48" style={{animation:'spin 0.9s linear infinite'}}><circle cx="24" cy="24" r="20" fill="none" stroke="#e2e8f0" strokeWidth="4"/><path d="M24 4 A20 20 0 0 1 44 24" fill="none" stroke="#6366f1" strokeWidth="4" strokeLinecap="round"/></svg>
    <div style={{fontWeight:700,fontSize:19,color:'#0f172a'}}>Building org chart for {company}{d}</div>
    <div style={{fontSize:13,color:'#94a3b8'}}>Querying leadership data</div>
  </div>);
}

// ─── App ──────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('search');
  const [query,setQuery]=useState('');
  const [companyMeta,setCompanyMeta]=useState(null);
  const [people,setPeople]=useState([]);
  const [history,setHistory]=useState([]);
  const [selected,setSelected]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [showAddContact,setShowAddContact]=useState(false);
  const [finderOpen,setFinderOpen]=useState(false);
  const [pendingCompany,setPendingCompany]=useState(null);
  const [error,setError]=useState('');
  const [apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem('oc_api_key')||'';}catch{return '';}});
  const zoomRef = useRef(null);

  const saveKey=k=>{setApiKey(k);try{k?localStorage.setItem('oc_api_key',k):localStorage.removeItem('oc_api_key');}catch{}};

  const loadCompany=(data)=>{
    setCompanyMeta({name:data.company,sources:data.sources||[],originalPeople:[...data.people]});
    setPeople([...data.people]);
    setHistory([]);
    setScreen('chart');
  };
  const runSearch=async(company,key)=>{
    setQuery(company);setSelected(null);setError('');
    const ck=companyKey(company);
    if(COMPANIES[ck]){loadCompany(COMPANIES[ck]);return;}
    setScreen('loading');
    try{const d=await lookupCompany(company,key);loadCompany(d);}
    catch(e){setError(e.message);setScreen('error');}
  };
  const handleSearch=company=>{
    const ck=companyKey(company);
    if(COMPANIES[ck]){runSearch(company,apiKey);return;}
    if(apiKey){runSearch(company,apiKey);return;}
    setPendingCompany(company);setShowSettings(true);
  };

  const handleReparent=useCallback((childId,newParentId)=>{
    setPeople(prev=>{const next=prev.map(p=>p.id===childId?{...p,parentId:newParentId}:p);setHistory(h=>[...h,prev]);return next;});
    setSelected(null);
  },[]);

  const handleAddContact = (form) => {
    setPeople(prev => { const newP={...form,id:String(Math.max(0,...prev.map(p=>parseInt(p.id)||0))+1)}; setHistory(h=>[...h,prev]); return [...prev,newP]; });
  };
  const handleUpdateContact = (updated) => {
    setPeople(prev => { setHistory(h=>[...h,prev]); return prev.map(p=>p.id===updated.id?{...p,...updated}:p); });
    setSelected(updated);
  };
  const handleDeleteContact = (id) => {
    setPeople(prev => { const person=prev.find(p=>p.id===id); if(!person)return prev; setHistory(h=>[...h,prev]); return prev.filter(p=>p.id!==id).map(p=>p.parentId===id?{...p,parentId:person.parentId}:p); });
    setSelected(null);
  };
  const handleUndo=()=>{if(!history.length)return;setPeople(history[history.length-1]);setHistory(h=>h.slice(0,-1));};
  const handleReset=()=>{if(!companyMeta)return;setPeople([...companyMeta.originalPeople]);setHistory([]);};

  const tree = companyMeta ? flatToTree(people, companyMeta.name, companyMeta.sources) : null;
  function countAll(n){if(!n)return 0;return 1+(n.children||[]).reduce((s,c)=>s+countAll(c),0);}

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {showSettings&&<ApiKeyModal apiKey={apiKey} pendingCompany={pendingCompany} onSave={saveKey}
        onClose={k=>{setShowSettings(false);setPendingCompany(null);if(k&&pendingCompany)runSearch(pendingCompany,k);}}/>}
      {showAddContact&&<AddContactModal people={people} onSave={handleAddContact} onClose={()=>setShowAddContact(false)}/>}

      {screen==='search'&&<SearchScreen onSearch={handleSearch} apiKey={apiKey} onSettings={()=>setShowSettings(true)}/>}
      {screen==='loading'&&<LoadingScreen company={query}/>}
      {screen==='error'&&(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14,fontFamily:"-apple-system,'Segoe UI',sans-serif"}}>
          <div style={{fontSize:44}}>&#128533;</div>
          <div style={{fontWeight:800,fontSize:19,color:'#0f172a'}}>Company not found</div>
          <div style={{color:'#64748b',fontSize:14,maxWidth:400,textAlign:'center',lineHeight:1.6}}>{error}</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setScreen('search')} className="btn-primary">Try another</button>
            {!apiKey&&<button onClick={()=>{setScreen('search');setShowSettings(true);}} style={{padding:'10px 22px',borderRadius:10,fontSize:14,fontWeight:700,background:'white',color:'#6366f1',border:'2px solid #6366f1',cursor:'pointer'}}>Enable live lookup</button>}
          </div>
        </div>
      )}
      {screen==='chart'&&tree&&(
        <>
          <Toolbar company={companyMeta.name} sources={companyMeta.sources} count={countAll(tree)}
            canUndo={history.length>0} modified={history.length>0}
            onBack={()=>{setScreen('search');setSelected(null);setFinderOpen(false);}}
            onUndo={handleUndo} onReset={handleReset}
            onAddContact={()=>setShowAddContact(true)}
            onToggleFinder={()=>setFinderOpen(!finderOpen)} finderOpen={finderOpen}
          />
          <div style={{flex:1,overflow:'hidden',position:'relative',background:'#f8fafc'}}>
            <PeopleFinder open={finderOpen} onClose={()=>setFinderOpen(false)} apiKey={apiKey}
              people={people} onAddPerson={handleAddContact} companyName={companyMeta.name}
              onRequestApiKey={()=>setShowSettings(true)} />
            <OrgChart data={tree} onSelect={setSelected} onReparent={handleReparent} zoomRef={zoomRef}/>
            <ContactPanel contact={selected} people={people} onClose={()=>setSelected(null)} onUpdate={handleUpdateContact} onDelete={handleDeleteContact}/>
            <ZoomControls zoomRef={zoomRef}/>
          </div>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
