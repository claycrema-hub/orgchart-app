<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Constants ────────────────────────────────────────────────────────────────
const CARD_W = 188, CARD_H = 72;
const COLORS = ['#6366f1','#0ea5e9','#10b981','#f59e0b','#ec4899','#8b5cf6','#06b6d4'];

function titleLevel(t='') {
  const s = t.toLowerCase();
  if (/\bceo\b|chief executive|co-founder.+ceo/.test(s)) return 0;
  if (/\bcfo\b|\bcoo\b|\bcto\b|\bcmo\b|\bcpo\b|\bcro\b|\bclo\b|\bcio\b|\bchro\b|chief\s+\w+\s+officer|\bpresident\b/.test(s)) return 1;
  if (/\bevp\b|\bsvp\b/.test(s)) return 2;
  if (/\bvp\b|vice president/.test(s)) return 3;
  if (/director|head of/.test(s)) return 4;
  return 5;
}
const lc = lv => COLORS[Math.min(lv, COLORS.length-1)];
const cut = (s,n) => s&&s.length>n ? s.slice(0,n-1)+'…' : (s||'');
const companyKey = n => n.toLowerCase().replace(/\s*(inc|corp|llc|ltd|co\.?)\b\.?/gi,'').replace(/[^a-z0-9]/g,'');

function flatToTree(people, companyName, sources) {
  const map = {};
  people.forEach(p => map[p.id] = {...p, children:[]});
  let root = null;
  const ids = new Set(people.map(p=>p.id));
  people.forEach(p => {
    if (!p.parentId) root = map[p.id];
    else if (ids.has(p.parentId)) map[p.parentId].children.push(map[p.id]);
    else if (root) root.children.push(map[p.id]);
  });
  if (!root && people.length) root = map[people[0].id];
  return { ...root, companyName, sources: sources||[], _flat: people };
}

// ─── Anthropic API ─────────────────────────────────────────────────────────────
async function lookupCompany(company, apiKey) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({
      model:'claude-opus-4-6',
      max_tokens:4096,
      messages:[{role:'user',content:`Generate a current leadership org chart for "${company}".
Return ONLY valid JSON, no markdown:
{"company":"${company}","domain":"company.com","people":[
  {"id":"1","name":"Full Name","title":"Job Title","parentId":null,"department":"Executive"},
  {"id":"2","name":"Full Name","title":"Job Title","parentId":"1","department":"Finance"}
]}
Rules: CEO at top (parentId null), C-suite under CEO, key VPs under C-suite, 15-40 people, accurate & current.`}]
    })
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`API error ${res.status}`); }
  const d = await res.json();
  const m = d.content[0].text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('Could not parse response');
  const p = JSON.parse(m[0]);
  return { ...p, sources:['Claude AI'] };
}

// ─── Draggable Org Chart ──────────────────────────────────────────────────────
function OrgChart({ data, onSelect, onReparent }) {
  const svgRef = useRef(null);
  const stateRef = useRef({ nodes:[], links:[], zoomTransform:d3.zoomIdentity });

  const draw = useCallback(() => {
    if (!svgRef.current || !data) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();

    const root = d3.hierarchy(data);
    const tree = d3.tree().nodeSize([CARD_W+30, CARD_H+54]);
    tree(root);

    const nodes = root.descendants(), links = root.links();
    stateRef.current.nodes = nodes;

    let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
    nodes.forEach(n=>{x0=Math.min(x0,n.x-CARD_W/2);x1=Math.max(x1,n.x+CARD_W/2);y0=Math.min(y0,n.y);y1=Math.max(y1,n.y+CARD_H);});
    const tW=x1-x0+60, tH=y1-y0+70;
    const el=svgRef.current.parentElement;
    const vw=el.clientWidth||900, vh=el.clientHeight||600;
    svg.attr('width',vw).attr('height',vh);

    // Defs
    const defs=svg.append('defs');
    const f=defs.append('filter').attr('id','sh').attr('x','-30%').attr('y','-30%').attr('width','160%').attr('height','160%');
    f.append('feDropShadow').attr('dx',0).attr('dy',2).attr('stdDeviation',4).attr('flood-color','rgba(0,0,0,0.09)');
    const fBig=defs.append('filter').attr('id','sh2').attr('x','-30%').attr('y','-30%').attr('width','160%').attr('height','160%');
    fBig.append('feDropShadow').attr('dx',0).attr('dy',8).attr('stdDeviation',14).attr('flood-color','rgba(99,102,241,0.22)');

    const g = svg.append('g').attr('class','tree-root');

    // Zoom
    const zoom = d3.zoom().scaleExtent([0.1,2.5])
      .on('zoom', e => {
        g.attr('transform', e.transform);
        stateRef.current.zoomTransform = e.transform;
      });
    svg.call(zoom);
    const sc = Math.min(1,(vw-60)/tW,(vh-60)/tH);
    const initT = d3.zoomIdentity.translate(vw/2,40).scale(sc).translate(-(x0+tW/2-30),0);
    svg.call(zoom.transform, initT);
    stateRef.current.zoomTransform = initT;

    // Link group (re-drawn on drag)
    const linkGroup = g.append('g').attr('class','links');
    const nodeGroup = g.append('g').attr('class','nodes');

    function drawLinks(lks) {
      linkGroup.selectAll('.lk').data(lks).join('path').attr('class','lk')
        .attr('fill','none').attr('stroke','#dde3ed').attr('stroke-width',1.5)
        .attr('d', lk=>{
          const sx=lk.source.x,sy=lk.source.y+CARD_H;
          const tx=lk.target.x,ty=lk.target.y,my=(sy+ty)/2;
          return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
        });
    }
    drawLinks(links);

    // Drop target indicator
    let dropTarget = null;
    let dragNode = null;
    let didDrag = false;

    function isAncestorOf(potentialAncestor, node) {
      let cur = node.parent;
      while (cur) { if (cur === potentialAncestor) return true; cur = cur.parent; }
      return false;
    }

    // Draw nodes
    const nd = nodeGroup.selectAll('.nd').data(nodes).join('g')
      .attr('class','nd')
      .attr('transform', n=>`translate(${n.x-CARD_W/2},${n.y})`)
      .style('cursor','grab');

    // Card BG
    nd.append('rect').attr('class','card-bg')
      .attr('width',CARD_W).attr('height',CARD_H).attr('rx',9).attr('ry',9)
      .attr('fill','white')
      .attr('stroke',n=>lc(titleLevel(n.data.title))).attr('stroke-width',1.5)
      .attr('filter','url(#sh)');
    // Accent
    nd.append('rect').attr('width',CARD_W).attr('height',4).attr('rx',9).attr('fill',n=>lc(titleLevel(n.data.title)));
    nd.append('rect').attr('y',2).attr('width',CARD_W).attr('height',3).attr('fill',n=>lc(titleLevel(n.data.title)));
    // Name
    nd.append('text').attr('x',CARD_W/2).attr('y',27).attr('text-anchor','middle')
      .attr('font-size',11.5).attr('font-weight','700').attr('fill','#0f172a')
      .attr('font-family',"-apple-system,'Segoe UI',sans-serif").text(n=>cut(n.data.name,25));
    // Title
    nd.append('text').attr('x',CARD_W/2).attr('y',46).attr('text-anchor','middle')
      .attr('font-size',10).attr('fill','#64748b')
      .attr('font-family',"-apple-system,'Segoe UI',sans-serif").text(n=>cut(n.data.title,30));
    // Children badge
    nd.filter(n=>n.children&&n.children.length>0)
      .append('circle').attr('cx',CARD_W-11).attr('cy',CARD_H-11).attr('r',9.5)
      .attr('fill',n=>lc(titleLevel(n.data.title)));
    nd.filter(n=>n.children&&n.children.length>0)
      .append('text').attr('x',CARD_W-11).attr('y',CARD_H-11)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-size',9).attr('font-weight','800').attr('fill','white')
      .text(n=>n.children.length);

    // Drag hint overlay (center of card for grab)
    nd.append('rect').attr('class','drag-handle')
      .attr('width',CARD_W).attr('height',CARD_H).attr('rx',9).attr('fill','transparent').attr('stroke','none');

    // ── DRAG BEHAVIOR ──────────────────────────────────────────────────────────
    const drag = d3.drag()
      .on('start', function(event, d) {
        if (event.sourceEvent) event.sourceEvent.stopPropagation();
        didDrag = false;
        dragNode = d;
        d3.select(this).raise().style('cursor','grabbing');
        d3.select(this).select('.card-bg').attr('filter','url(#sh2)').attr('stroke-width',2.5).attr('opacity',0.92);
      })
      .on('drag', function(event, d) {
        if (Math.abs(event.dx) < 1 && Math.abs(event.dy) < 1 && !didDrag) return;
        didDrag = true;
        // Move dragged card with mouse (event coords are in tree space via D3)
        d3.select(this).attr('transform', `translate(${event.x - CARD_W/2},${event.y - CARD_H/2})`);

        // Find nearest valid drop target
        let nearest = null, minDist = 90;
        nodes.forEach(n => {
          if (n === d || n === d.parent || isAncestorOf(d, n)) return;
          const dist = Math.hypot(n.x - event.x, (n.y + CARD_H/2) - event.y);
          if (dist < minDist) { minDist = dist; nearest = n; }
        });

        // Update drop target highlight
        if (nearest !== dropTarget) {
          if (dropTarget) {
            nodeGroup.selectAll('.nd').filter(n=>n===dropTarget).select('.card-bg')
              .attr('stroke',n=>lc(titleLevel(n.data.title))).attr('stroke-width',1.5).attr('stroke-dasharray',null);
          }
          dropTarget = nearest;
          if (dropTarget) {
            nodeGroup.selectAll('.nd').filter(n=>n===dropTarget).select('.card-bg')
              .attr('stroke','#10b981').attr('stroke-width',2.5).attr('stroke-dasharray','0');
          }
        }
      })
      .on('end', function(event, d) {
        d3.select(this).style('cursor','grab');
        d3.select(this).select('.card-bg').attr('filter','url(#sh)').attr('stroke-width',1.5).attr('opacity',1);

        // Clear drop target highlight
        if (dropTarget) {
          nodeGroup.selectAll('.nd').filter(n=>n===dropTarget).select('.card-bg')
            .attr('stroke',n=>lc(titleLevel(n.data.title))).attr('stroke-width',1.5).attr('stroke-dasharray',null);
        }

        if (!didDrag) {
          // It was a click — select contact
          d3.select(this).attr('transform',`translate(${d.x-CARD_W/2},${d.y})`);
          onSelect(d.data);
          dropTarget = null;
          dragNode = null;
          return;
        }

        if (dropTarget && dropTarget !== d && dropTarget !== d.parent) {
          // Valid drop — reparent
          onReparent(d.data.id, dropTarget.data.id);
        } else {
          // Snap back
          d3.select(this).transition().duration(220).ease(d3.easeCubicOut)
            .attr('transform',`translate(${d.x-CARD_W/2},${d.y})`);
        }

        dropTarget = null;
        dragNode = null;
      });

    nd.call(drag);

    svg.on('click', () => onSelect(null));

  }, [data, onSelect, onReparent]);

  useEffect(()=>{
    draw();
    const ro = new ResizeObserver(draw);
    if (svgRef.current?.parentElement) ro.observe(svgRef.current.parentElement);
    return ()=>ro.disconnect();
  }, [draw]);

  return (
    <div style={{position:'relative',width:'100%',height:'100%'}}>
      <svg ref={svgRef} style={{display:'block',width:'100%',height:'100%'}} />
      <div style={{
        position:'absolute',bottom:12,left:'50%',transform:'translateX(-50%)',
        background:'rgba(255,255,255,0.85)',backdropFilter:'blur(6px)',
        border:'1px solid #e2e8f0',borderRadius:20,padding:'5px 14px',
        fontSize:12,color:'#94a3b8',pointerEvents:'none',whiteSpace:'nowrap',
        boxShadow:'0 1px 6px rgba(0,0,0,0.06)',
      }}>
        Drag cards to rearrange · Click to view details · Scroll to zoom
      </div>
    </div>
  );
}

// ─── Contact Panel ─────────────────────────────────────────────────────────────
function ContactPanel({contact,onClose}){
  if(!contact) return null;
  const color=lc(titleLevel(contact.title));
  return(
    <div style={{position:'absolute',top:12,right:12,width:264,background:'white',borderRadius:12,overflow:'hidden',boxShadow:'0 8px 32px rgba(0,0,0,0.14)',fontFamily:"-apple-system,'Segoe UI',sans-serif",animation:'fadeIn .15s ease',zIndex:10}}>
      <div style={{height:5,background:color}}/>
      <div style={{padding:'14px 16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:'#0f172a',marginBottom:2}}>{contact.name}</div>
            <div style={{fontSize:11,color:color,fontWeight:600}}>{contact.title}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',fontSize:20,lineHeight:1,paddingLeft:8}}>×</button>
        </div>
        {contact.department&&<PRow k="Department" v={contact.department}/>}
        {contact.email&&<PRow k="Email" v={<a href={`mailto:${contact.email}`} style={{color:'#6366f1',textDecoration:'none'}}>{contact.email}</a>}/>}
        {contact.phone&&<PRow k="Phone" v={contact.phone}/>}
        {contact.linkedin&&<PRow k="LinkedIn" v={<a href={contact.linkedin} target="_blank" rel="noreferrer" style={{color:'#6366f1',textDecoration:'none'}}>View profile →</a>}/>}
      </div>
    </div>
  );
}
function PRow({k,v}){return(
  <div style={{marginBottom:7}}>
    <div style={{fontSize:9,color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:2}}>{k}</div>
    <div style={{fontSize:11,color:'#334155'}}>{v}</div>
  </div>
);}

// ─── Toolbar ───────────────────────────────────────────────────────────────────
function Toolbar({company,sources,count,canUndo,onBack,onUndo,onReset,modified}){
  return(
    <div style={{height:54,background:'white',borderBottom:'1px solid #e8ecf2',display:'flex',alignItems:'center',padding:'0 16px',gap:10,flexShrink:0,fontFamily:"-apple-system,'Segoe UI',sans-serif"}}>
      <button onClick={onBack} style={{background:'none',border:'1px solid #e2e8f0',borderRadius:8,padding:'5px 12px',fontSize:13,cursor:'pointer',color:'#475569',fontWeight:600}}>← Back</button>
      <div style={{fontWeight:800,fontSize:16,color:'#0f172a'}}>{company}</div>
      <div style={{fontSize:12,color:'#94a3b8'}}>{count} people</div>

      {modified&&(
        <div style={{display:'flex',gap:6,marginLeft:4}}>
          <button onClick={onUndo} disabled={!canUndo} style={{
            padding:'5px 12px',borderRadius:7,border:'1px solid #e2e8f0',background:'white',
            cursor:canUndo?'pointer':'default',fontSize:12,color:canUndo?'#475569':'#cbd5e1',fontWeight:500,
          }}>↩ Undo</button>
          <button onClick={onReset} style={{
            padding:'5px 12px',borderRadius:7,border:'1px solid #fca5a5',background:'#fff5f5',
            cursor:'pointer',fontSize:12,color:'#dc2626',fontWeight:500,
          }}>Reset</button>
          <span style={{fontSize:11,color:'#10b981',fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#10b981',display:'inline-block'}}/>
            Edited
          </span>
        </div>
      )}

      <div style={{marginLeft:'auto',display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:11,color:'#94a3b8'}}>Sources:</span>
        {(sources||[]).map(s=>(
          <span key={s} style={{fontSize:11,background:'#eef2ff',color:'#4f46e5',borderRadius:5,padding:'2px 8px',fontWeight:600}}>{s}</span>
        ))}
      </div>
    </div>
  );
}

// ─── API Key Modal ─────────────────────────────────────────────────────────────
function ApiKeyModal({apiKey,pendingCompany,onSave,onClose}){
  const [val,setVal]=useState(apiKey||'');
  const go=()=>{const k=val.trim();if(k){onSave(k);onClose(k);}};
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,fontFamily:"-apple-system,'Segoe UI',sans-serif"}}>
      <div style={{background:'white',borderRadius:16,padding:32,width:460,boxShadow:'0 24px 64px rgba(0,0,0,0.18)',animation:'fadeIn .18s ease'}}>
        <div style={{fontSize:36,marginBottom:12}}>🔑</div>
        <h2 style={{fontSize:20,fontWeight:800,color:'#0f172a',marginBottom:8}}>{pendingCompany?`Look up ${pendingCompany}`:'Enable any-company lookup'}</h2>
        <p style={{fontSize:13,color:'#64748b',lineHeight:1.65,marginBottom:20}}>
          Paste your Anthropic API key to search any company in real time — <strong>one-time setup</strong>, stored only in your browser.<br/><br/>
          Get a free key at{' '}
          <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer" style={{color:'#6366f1',fontWeight:600}}>console.anthropic.com → API Keys</a>
        </p>
        <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}
          placeholder="sk-ant-api03-..." autoFocus
          style={{width:'100%',padding:'12px 14px',borderRadius:8,border:'1.5px solid #e2e8f0',fontSize:13,marginBottom:16,fontFamily:'monospace'}}/>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button onClick={()=>onClose(null)} style={{padding:'10px 18px',borderRadius:8,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:13,color:'#475569'}}>Cancel</button>
          <button onClick={go} disabled={!val.trim()} style={{padding:'10px 22px',borderRadius:8,border:'none',background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',cursor:'pointer',fontSize:14,fontWeight:700,opacity:val.trim()?1:0.5}}>
            {pendingCompany?`Search ${pendingCompany} →`:'Save & Enable'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Search Screen ─────────────────────────────────────────────────────────────
const CHIPS = ['Nike','Workday','Salesforce','ServiceNow','Snowflake','HubSpot','Zendesk','Databricks'];
function SearchScreen({onSearch,apiKey,onSettings}){
  const [val,setVal]=useState('');
  const go=e=>{e.preventDefault();if(val.trim())onSearch(val.trim());};
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',background:'#f8fafc',padding:24,fontFamily:"-apple-system,'Segoe UI',sans-serif"}}>
      <div style={{marginBottom:40,textAlign:'center'}}>
        <div style={{width:62,height:62,borderRadius:17,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',boxShadow:'0 6px 24px rgba(99,102,241,0.32)'}}>
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="3.5" r="2.6" fill="white"/>
            <circle cx="4" cy="17" r="2.6" fill="white"/>
            <circle cx="20" cy="17" r="2.6" fill="white"/>
            <line x1="12" y1="6.1" x2="4" y2="14.4" stroke="white" strokeWidth="1.9" strokeLinecap="round"/>
            <line x1="12" y1="6.1" x2="20" y2="14.4" stroke="white" strokeWidth="1.9" strokeLinecap="round"/>
          </svg>
        </div>
        <h1 style={{fontSize:36,fontWeight:900,color:'#0f172a',letterSpacing:'-0.025em',marginBottom:8}}>OrgChart</h1>
        <p style={{color:'#64748b',fontSize:15}}>Visual leadership intelligence for every account</p>
      </div>

      <form onSubmit={go} style={{width:'100%',maxWidth:520}}>
        <div style={{display:'flex',gap:8,boxShadow:'0 2px 16px rgba(0,0,0,0.07)',borderRadius:14}}>
          <input value={val} onChange={e=>setVal(e.target.value)} placeholder="Type any company name..." autoFocus
            style={{flex:1,padding:'15px 20px',borderRadius:'14px 0 0 14px',fontSize:15,border:'1.5px solid #e2e8f0',borderRight:'none',background:'white',color:'#0f172a'}}/>
          <button type="submit" disabled={!val.trim()} style={{padding:'15px 26px',borderRadius:'0 14px 14px 0',fontSize:15,fontWeight:700,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',border:'none',cursor:'pointer',whiteSpace:'nowrap'}}>
            Search →
          </button>
        </div>
      </form>

      <div style={{marginTop:14,display:'flex',gap:7,flexWrap:'wrap',justifyContent:'center',maxWidth:520}}>
        {CHIPS.map(co=>(
          <button key={co} onClick={()=>onSearch(co)} style={{padding:'6px 15px',borderRadius:20,fontSize:13,background:'white',border:'1.5px solid #e2e8f0',color:'#475569',cursor:'pointer',fontWeight:500}}>{co}</button>
        ))}
      </div>

      {!apiKey?(
        <div style={{marginTop:24,background:'#eef2ff',border:'1.5px solid #c7d2fe',borderRadius:12,padding:'14px 20px',maxWidth:520,width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:'#3730a3',marginBottom:2}}>Want to search any company?</div>
            <div style={{fontSize:12,color:'#4f46e5'}}>Add your Anthropic API key — one-time setup, then every account works.</div>
          </div>
          <button onClick={onSettings} style={{padding:'9px 16px',borderRadius:8,border:'none',background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',cursor:'pointer',fontSize:13,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>Set up →</button>
        </div>
      ):(
        <div style={{marginTop:20,display:'flex',alignItems:'center',gap:8,fontSize:12,color:'#94a3b8'}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'#10b981',display:'inline-block'}}/>
          Live lookup active — any company works
          <button onClick={onSettings} style={{color:'#6366f1',background:'none',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,textDecoration:'underline'}}>Change key</button>
        </div>
      )}
    </div>
  );
}

// ─── Loading Screen ────────────────────────────────────────────────────────────
function LoadingScreen({company}){
  const [d,setD]=useState('');
  useEffect(()=>{const iv=setInterval(()=>setD(x=>x.length>=3?'':x+'.'),380);return()=>clearInterval(iv);},[]);
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',background:'#f8fafc',gap:16,fontFamily:"-apple-system,'Segoe UI',sans-serif"}}>
      <svg width="48" height="48" viewBox="0 0 48 48" style={{animation:'spin 0.9s linear infinite'}}>
        <circle cx="24" cy="24" r="20" fill="none" stroke="#e2e8f0" strokeWidth="4"/>
        <path d="M24 4 A20 20 0 0 1 44 24" fill="none" stroke="#6366f1" strokeWidth="4" strokeLinecap="round"/>
      </svg>
      <div style={{fontWeight:700,fontSize:19,color:'#0f172a'}}>Building org chart for {company}{d}</div>
      <div style={{fontSize:13,color:'#94a3b8'}}>Querying leadership data</div>
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('search');
  const [query,setQuery]=useState('');
  const [companyMeta,setCompanyMeta]=useState(null); // {name, sources, originalPeople}
  const [people,setPeople]=useState([]);             // editable flat list
  const [history,setHistory]=useState([]);            // undo stack
  const [selected,setSelected]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [pendingCompany,setPendingCompany]=useState(null);
  const [error,setError]=useState('');
  const [apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem('oc_api_key')||'';}catch{return '';}});

  const saveKey=k=>{setApiKey(k);try{k?localStorage.setItem('oc_api_key',k):localStorage.removeItem('oc_api_key');}catch{}};

  const loadCompany=(data)=>{
    setCompanyMeta({name:data.company,sources:data.sources||[],originalPeople:[...data.people]});
    setPeople([...data.people]);
    setHistory([]);
    setScreen('chart');
  };

  const runSearch=async(company,key)=>{
    setQuery(company); setSelected(null); setError('');
    const ck=companyKey(company);
    if(COMPANIES[ck]){loadCompany(COMPANIES[ck]);return;}
    setScreen('loading');
    try{const d=await lookupCompany(company,key);loadCompany(d);}
    catch(e){setError(e.message);setScreen('error');}
  };

  const handleSearch=company=>{
    const ck=companyKey(company);
    if(COMPANIES[ck]){runSearch(company,apiKey);return;}
    if(apiKey){runSearch(company,apiKey);return;}
    setPendingCompany(company);setShowSettings(true);
  };

  // Drag reparent
  const handleReparent=useCallback((childId,newParentId)=>{
    setPeople(prev=>{
      const next=prev.map(p=>p.id===childId?{...p,parentId:newParentId}:p);
      setHistory(h=>[...h,prev]);
      return next;
    });
    setSelected(null);
  },[]);

  const handleUndo=()=>{
    if(!history.length)return;
    const prev=history[history.length-1];
    setPeople(prev);
    setHistory(h=>h.slice(0,-1));
  };

  const handleReset=()=>{
    if(!companyMeta)return;
    setPeople([...companyMeta.originalPeople]);
    setHistory([]);
  };

  const tree = companyMeta ? flatToTree(people, companyMeta.name, companyMeta.sources) : null;
  function countAll(n){if(!n)return 0;return 1+(n.children||[]).reduce((s,c)=>s+countAll(c),0);}

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {showSettings&&<ApiKeyModal apiKey={apiKey} pendingCompany={pendingCompany} onSave={saveKey}
        onClose={k=>{setShowSettings(false);setPendingCompany(null);if(k&&pendingCompany)runSearch(pendingCompany,k);}}/>}

      {screen==='search'&&<SearchScreen onSearch={handleSearch} apiKey={apiKey} onSettings={()=>setShowSettings(true)}/>}
      {screen==='loading'&&<LoadingScreen company={query}/>}

      {screen==='error'&&(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14,fontFamily:"-apple-system,'Segoe UI',sans-serif"}}>
          <div style={{fontSize:44}}>😕</div>
          <div style={{fontWeight:800,fontSize:19,color:'#0f172a'}}>Company not found</div>
          <div style={{color:'#64748b',fontSize:14,maxWidth:400,textAlign:'center',lineHeight:1.6}}>{error}</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setScreen('search')} style={{padding:'10px 22px',borderRadius:10,fontSize:14,fontWeight:700,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',border:'none',cursor:'pointer'}}>Try another</button>
            {!apiKey&&<button onClick={()=>{setScreen('search');setShowSettings(true);}} style={{padding:'10px 22px',borderRadius:10,fontSize:14,fontWeight:700,background:'white',color:'#6366f1',border:'2px solid #6366f1',cursor:'pointer'}}>Enable live lookup</button>}
          </div>
        </div>
      )}

      {screen==='chart'&&tree&&(
        <>
          <Toolbar
            company={companyMeta.name} sources={companyMeta.sources} count={countAll(tree)}
            canUndo={history.length>0} modified={history.length>0}
            onBack={()=>{setScreen('search');setSelected(null);}}
            onUndo={handleUndo} onReset={handleReset}
          />
          <div style={{flex:1,overflow:'hidden',position:'relative',background:'#f8fafc'}}>
            <OrgChart data={tree} onSelect={setSelected} onReparent={handleReparent}/>
            <ContactPanel contact={selected} onClose={()=>setSelected(null)}/>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
